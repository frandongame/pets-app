services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: pets_db
      MYSQL_USER: usuario_app
      MYSQL_PASSWORD: clave_app
    ports:
      - "3308:3306"
    volumes:
      - ./sql/sql_mysql.sql:/docker-entrypoint-initdb.d/sql_mysql.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  api:
    build: .
    container_name: pets-api
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/pets_db
      SPRING_DATASOURCE_USERNAME: usuario_app
      SPRING_DATASOURCE_PASSWORD: clave_app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_started
    restart: on-failure
  frontend:
    build: frontend
    container_name: pets-frontend
    environment:
      API_URL: http://api:8080/pet/list
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/var/www/html
    depends_on:
      - api